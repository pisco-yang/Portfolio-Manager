<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Portfolio Management Platform</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <i class="fas fa-chart-line"></i> Portfolio Manager
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" onclick="showTab('overview')">
                    <i class="fas fa-home"></i> Overview
                </button>
                <button class="nav-tab" onclick="showTab('trading')">
                    <i class="fas fa-exchange-alt"></i> Trading
                </button>
                <button class="nav-tab" onclick="showTab('history')">
                    <i class="fas fa-history"></i> History
                </button>
                <button class="nav-tab" onclick="showTab('analytics')">
                    <i class="fas fa-chart-bar"></i> Analytics
                </button>
            </div>
            <div class="real-time-clock">
                <div class="clock-time" id="clockTime">00:00:00</div>
                <div class="clock-date" id="clockDate">January 1, 2024</div>
            </div>
        </div>

        <!-- Portfolio Stats -->
        <div class="portfolio-stats">
            <div class="stat-card">
                <div class="stat-value" id="totalValue">$0</div>
                <div class="stat-label">Total Portfolio Value</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalGain">$0</div>
                <div class="stat-label">Total Gain/Loss</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalReturn">0%</div>
                <div class="stat-label">Total Return</div>
            </div>
        </div>

        <!-- Main Content -->
        <div id="overview" class="tab-content">
            <div class="main-content">
                <!-- Portfolio Value Chart -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Portfolio Value Trend</div>
                        <div class="card-icon portfolio-value">
                            <i class="fas fa-chart-line"></i>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <div class="chart-range-btn-group" id="portfolioRangeBtnGroup" style="display: flex; gap: 10px; margin-bottom: 0; justify-content: flex-end;">
                            <button class="range-btn active" data-range="7d">7 Days</button>
                            <button class="range-btn" data-range="30d">30 Days</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="portfolioChart"></canvas>
                    </div>
                </div>

                <!-- Asset Allocation -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Asset Allocation</div>
                        <div class="card-icon performance">
                            <i class="fas fa-pie-chart"></i>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="allocationChart"></canvas>
                    </div>
                </div>


            </div>

            <!-- Assets List -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title">Current Holdings</div>
                    <div class="card-icon assets">
                        <i class="fas fa-briefcase"></i>
                    </div>
                </div>
                <div id="assetsList">
                    <!-- Assets will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Trading Tab -->
        <div id="trading" class="tab-content" style="display: none;">
            <div class="main-content">
                <!-- Buy Form -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Buy Asset</div>
                        <div class="card-icon trading">
                            <i class="fas fa-plus"></i>
                        </div>
                    </div>
                    <form class="trading-form" id="buyForm">
                        <div class="form-group">
                            <label>Asset Type</label>
                            <select id="buyAssetType" required>
                                <option value="">Select Asset Type</option>
                                <option value="stock">Stock</option>
                                <option value="bond">Bond</option>
                                <option value="cash">Cash</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Asset Name</label>
                            <select id="buyAssetName" required>
                                <option value="">Select Asset Name</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Symbol</label>
                            <input type="text" id="buySymbol" placeholder="e.g., AAPL" required readonly>
                        </div>
                        <div class="form-group">
                            <label>Quantity</label>
                            <input type="number" id="buyQuantity" placeholder="e.g., 10" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label>Purchase Price (Auto-filled from Current Price)</label>
                            <input type="number" id="buyPrice" placeholder="Auto-filled" step="0.01" required readonly>
                        </div>
                        <div class="form-group">
                            <label>Current Price</label>
                            <input type="number" id="buyCurrentPrice" placeholder="e.g., 180.00" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-plus"></i> Buy
                        </button>
                    </form>
                </div>

                <!-- Sell Form -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Sell Asset</div>
                        <div class="card-icon trading">
                            <i class="fas fa-minus"></i>
                        </div>
                    </div>
                    <form class="trading-form" id="sellForm">
                        <div class="form-group">
                            <label>Select Asset</label>
                            <select id="sellAssetId" required>
                                <option value="">Select Asset to Sell</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Quantity to Sell</label>
                            <input type="number" id="sellQuantity" placeholder="e.g., 5" step="0.01" required>
                        </div>
                                        <div class="form-group">
                    <label>Sell Price (Auto-fetched from Database)</label>
                    <input type="number" id="sellPrice" placeholder="e.g., 200.00" step="0.01" required readonly>
                </div>
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-minus"></i> Sell
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- History Tab -->
        <div id="history" class="tab-content" style="display: none;">
            <div class="main-content">
                <!-- Calendar Section -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Select Date</div>
                        <div class="card-icon performance">
                            <i class="fas fa-calendar-alt"></i>
                        </div>
                    </div>
                    <div class="calendar-container">
                        <div class="calendar-header">
                            <button id="prevMonth" class="calendar-nav-btn">
                                <i class="fas fa-chevron-left"></i>
                            </button>
                            <div class="calendar-title" id="calendarTitle">January 2024</div>
                            <button id="nextMonth" class="calendar-nav-btn">
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                        <div class="calendar-weekdays">
                            <div>Sun</div>
                            <div>Mon</div>
                            <div>Tue</div>
                            <div>Wed</div>
                            <div>Thu</div>
                            <div>Fri</div>
                            <div>Sat</div>
                        </div>
                        <div class="calendar-days" id="calendarDays">
                            <!-- Calendar days will be generated here -->
                        </div>
                    </div>
                </div>

                <!-- Transaction History Section -->
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Transaction History</div>
                        <div class="card-icon performance">
                            <i class="fas fa-history"></i>
                        </div>
                    </div>
                    <div id="transactionHistory">
                        <!-- Transaction history will be loaded here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Analytics Tab -->
        <div id="analytics" class="tab-content" style="display: none;">
            <div class="main-content">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Investment Performance Analysis</div>
                        <div class="card-icon performance">
                            <i class="fas fa-chart-bar"></i>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="performanceChart"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Risk Metrics</div>
                        <div class="card-icon assets">
                            <i class="fas fa-shield-alt"></i>
                        </div>
                    </div>
                    <div id="riskMetrics">
                        <!-- Risk metrics will be calculated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/charts.js"></script>
    <script src="js/main.js"></script>
    <script src="js/trading.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/calendar.js"></script>
</body>
</html>
